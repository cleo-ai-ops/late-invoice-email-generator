<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Late Invoice Email Generator</title><meta name="description" content="Generate a polite overdue invoice follow-up email for freelancers and consultants."><style>body{font-family:Inter,system-ui,sans-serif;line-height:1.55;margin:0;background:#f8fafc;color:#172033}main{max-width:880px;margin:auto;padding:30px 20px}label{display:block;margin-top:12px;font-weight:700}input,select,textarea{width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:10px}button,.btn{display:inline-block;background:#0f766e;color:white;border:0;border-radius:10px;padding:12px 15px;font-weight:700;margin-top:16px;text-decoration:none}textarea{min-height:210px}.card{background:white;border:1px solid #e5e7eb;border-radius:16px;padding:20px}</style></head><body><main><h1>Late Invoice Email Generator</h1><p>Draft a calm payment follow-up in the browser. No login, no tracking form.</p><div class="card"><label>Client name<input id="client" placeholder="Alex"></label><label>Invoice number<input id="invoice" placeholder="INV-1042"></label><label>Amount<input id="amount" placeholder="€450"></label><label>Days late<input id="days" type="number" value="7"></label><label>Tone<select id="tone"><option>gentle</option><option>firm</option><option>final notice</option></select></label><button onclick="gen()">Generate email</button><label>Draft<textarea id="out"></textarea></label><p><a class="btn" href="/client-intake-autopilot-pack/late-invoice-rescue-kit/">Need the full staged template pack? Get the Late Invoice Rescue Kit</a></p></div></main><script>function gen(){const c=client.value||'there',i=invoice.value||'[invoice number]',a=amount.value||'[amount]',d=Number(days.value||0),t=tone.value;let subject='Quick check on invoice '+i;let body='Hi '+c+',\n\nI wanted to check whether invoice '+i+' for '+a+' reached the right person. It is now '+d+' days past due and I have not seen the payment come through yet.\n\nCould you confirm it is queued, or let me know if anything is missing from my side?\n\nPayment details: [payment link]\n\nThanks,\n[your name]'; if(t==='firm'||d>=14){subject='Overdue invoice '+i+' — action needed';body='Hi '+c+',\n\nI am following up on invoice '+i+' for '+a+'. It is now '+d+' days overdue.\n\nPlease either send payment using [payment link], or reply with the exact payment date and any blocker I can help resolve. I need to close this before scheduling additional work.\n\nThanks,\n[your name]';} if(t==='final notice'){subject='Final follow-up before escalation — invoice '+i;body='Hi '+c+',\n\nI have followed up on invoice '+i+' for '+a+' and it remains unpaid. If payment is not received by [date], I will escalate according to the terms in our agreement.\n\nI would prefer to resolve this directly, so please send payment or a confirmed payment plan by [date].\n\nPayment details: [payment link]\n\nThanks,\n[your name]';} out.value='Subject: '+subject+'\n\n'+body;} gen()</script></body></html>
